project_language: java-gradle
runUnitTests: true
runLintTests: true
runSmokeTests: true
runSanityTests: true      # Enable for full regression testing

# Test execution configuration
test_execution:
  parallel: true
  fail_fast: false

# Tool configuration for different test types
tool_for_unit_testing:
  java: junit5

tool_for_lint_testing:
  java: checkstyle

# Test profiles configuration
test_profiles:
  smoke:
    enabled: true
    description: "Quick smoke tests to verify basic functionality"
  sanity:
    enabled: true
    description: "Sanity tests to verify core features"
  regression:
    enabled: false
    description: "Full regression test suite"

notifications:
  email:
    recipients:
      - smanprit022@gmail.com
  slack:
    enabled: false
    channel: "#builds"